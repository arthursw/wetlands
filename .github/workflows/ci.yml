name: ci

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: write

jobs:

  lint:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip tests]')
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Run lint checks
        run: uv run --frozen ruff check

  test:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip tests]')
    name: Test (${{ matrix.platform }} Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Run tests
        run: uv run --frozen pytest tests -m "not integration and not compat and not manual"

  compat:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip tests]')
    name: Python 3.9 Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: UV_PROJECT_ENVIRONMENT=.venv-py39 uv sync --frozen --python 3.9 --group dev
      - name: Run compatibility tests
        run: UV_PROJECT_ENVIRONMENT=.venv-py39 uv run --frozen --python 3.9 pytest -m compat

  agent-integration:
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    name: Agent Integration (pixi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: UV_PROJECT_ENVIRONMENT=.venv-py313 uv sync --frozen --python 3.13 --group dev
      - name: Run pixi agent integration tests
        run: UV_PROJECT_ENVIRONMENT=.venv-py313 uv run --frozen --python 3.13 pytest -m "not manual and not compat and agent_integration" --backend=pixi

  deploy:
    if: github.event_name == 'push' && always() # Deploy only after push-triggered checks finish.
    name: Deploy
    needs: [lint, test, compat]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Set up cache key
        id: cache-key
        run: echo "cache_id=$(date --utc '+%V')" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ steps.cache-key.outputs.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install uv
        run: pip install uv

      - name: Install docs dependencies
        run: uv sync --frozen --extra docs --no-dev

      - name: Get gh-pages branch
        run: git fetch origin gh-pages --depth=1

      - name: Set version default
        run: uv run --frozen --extra docs --no-dev mike set-default --push latest

      - name: Read project version
        run: |
          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "PROJECT_VERSION=${PROJECT_VERSION}" >> "$GITHUB_ENV"

      - name: Deploy version with mike (update gh-pages branch and push it)
        run: uv run --frozen --extra docs --no-dev mike deploy --push --update-aliases "$PROJECT_VERSION" latest
